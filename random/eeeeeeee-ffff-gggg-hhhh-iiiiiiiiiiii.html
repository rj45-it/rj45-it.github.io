<html>
    <head>
        <title>Gra Snake z Tuskiem</title>
        <link rel="stylesheet" href="eeeeeeee-ffff-gggg-hhhh-iiiiiiiiiiii.css">
    </head>
    <body>
        <div class="snake-game">
            <h1>Snake z Donaldem Tuskiem</h1>
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <p>Wąż ślizga się po twarzy Tuska. Zbieraj punkty, unikaj ścian!</p>
            <button onclick="location.href='../index.html'">Powrót</button>
        </div>
        <script>
            const canvas = document.getElementById('snakeCanvas');
            const ctx = canvas.getContext('2d');
            let snake = [{x: 200, y: 200}];
            let direction = {x: 10, y: 0};
            let food = {x: Math.floor(Math.random() * 40) * 10, y: Math.floor(Math.random() * 40) * 10};
            let score = 0;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Wąż
                ctx.fillStyle = 'green';
                snake.forEach(segment => {
                    ctx.fillRect(segment.x, segment.y, 10, 10);
                });
                // Jedzenie
                ctx.fillStyle = 'red';
                ctx.fillRect(food.x, food.y, 10, 10);
            }

            function update() {
                const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    food = {x: Math.floor(Math.random() * 40) * 10, y: Math.floor(Math.random() * 40) * 10};
                } else {
                    snake.pop();
                }
                // Kolizje
                if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                    alert('Koniec gry! Punkty: ' + score);
                    reset();
                }
            }

            function reset() {
                snake = [{x: 200, y: 200}];
                direction = {x: 10, y: 0};
                score = 0;
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' && direction.y === 0) direction = {x: 0, y: -10};
                if (e.key === 'ArrowDown' && direction.y === 0) direction = {x: 0, y: 10};
                if (e.key === 'ArrowLeft' && direction.x === 0) direction = {x: -10, y: 0};
                if (e.key === 'ArrowRight' && direction.x === 0) direction = {x: 10, y: 0};
            });

            setInterval(() => {
                update();
                draw();
            }, 100);
        </script>
    </body>
</html></content>
