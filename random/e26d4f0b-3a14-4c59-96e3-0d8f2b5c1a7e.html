<html>
    <head>
        <title>Kaszanka Shader</title>
        <link rel="stylesheet" href="e26d4f0b-3a14-4c59-96e3-0d8f2b5c1a7e.css">
    </head>
    <body>
        <canvas id="shader-canvas"></canvas>
        <div class="overlay">
            <h1>Shaderowa Kaszanka</h1>
            <p>Pełny WebGL w tle i pulsujące tempo, które sprawia, że ekran żyje własnym życiem.</p>
            <button onclick="location.href='../index.html'">Ucieczka</button>
        </div>
        <script>
            const canvas = document.getElementById('shader-canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) {
                document.body.innerHTML = '<p>WebGL nie jest wspierany.</p>';
            } else {
                const vertexSource = `attribute vec2 position; void main() { gl_Position = vec4(position, 0.0, 1.0); }`;
                const fragmentSource = `precision mediump float;
                uniform vec2 u_resolution;
                uniform float u_time;
                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    vec2 p = uv - 0.5;
                    p.x *= u_resolution.x / u_resolution.y;
                    float r = length(p) * 1.8;
                    float angle = atan(p.y, p.x);
                    float wave = sin(r * 15.0 - u_time * 3.0 + cos(angle * 6.0) * 2.0);
                    float glow = smoothstep(0.4, 0.0, abs(r - 0.35 + wave * 0.05));
                    vec3 base = mix(vec3(0.03, 0.00, 0.14), vec3(0.9, 0.1, 0.7), uv.x);
                    vec3 color = base + vec3(0.8, 0.4, 0.2) * glow;
                    color = pow(color, vec3(0.85));
                    gl_FragColor = vec4(color * (0.6 + 0.4 * sin(u_time * 2.0 + r * 6.0)), 1.0);
                }`;
                function compileShader(type, source) {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;
                }
                const vertexShader = compileShader(gl.VERTEX_SHADER, vertexSource);
                const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                gl.useProgram(program);
                const positionLocation = gl.getAttribLocation(program, 'position');
                const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
                const timeLocation = gl.getUniformLocation(program, 'u_time');
                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
                gl.enableVertexAttribArray(positionLocation);
                gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    gl.viewport(0, 0, canvas.width, canvas.height);
                }
                window.addEventListener('resize', resize);
                resize();
                let start = Date.now();
                function render() {
                    const time = (Date.now() - start) * 0.001;
                    gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
                    gl.uniform1f(timeLocation, time);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    requestAnimationFrame(render);
                }
                render();
            }
        </script>
    </body>
</html>
